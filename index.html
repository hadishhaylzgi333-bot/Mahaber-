<!DOCTYPE html>
<html lang="ti">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ማሓበር ዓዲ ቀይታ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#f1f3f4;min-height:100vh;}
#app{max-width:600px;margin:0 auto;}
button,input,textarea{font-family:inherit;cursor:pointer;}
input,textarea{cursor:text;}

.topbar{background:#1a73e8;color:#fff;padding:10px 14px;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sub-info{font-size:11px;opacity:.8;margin-top:2px;display:flex;align-items:center;gap:6px;}
.badge{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:10px;}
.tbtn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.5);color:#fff;padding:6px 9px;border-radius:6px;font-size:12px;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab{padding:5px 10px;border-radius:20px;border:none;font-size:11px;}
.tab.active{background:#fff;color:#1a73e8;font-weight:bold;}
.tab.inactive{background:rgba(255,255,255,.18);color:#fff;}

.panel{background:#fff;margin:8px 12px;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.1);border:1px solid #dadce0;}
.panel-title{font-weight:bold;color:#1a73e8;margin-bottom:10px;}
.warn-box{font-size:12px;color:#555;margin-bottom:10px;background:#fef9e7;padding:10px;border-radius:8px;border:1px solid #f5d56a;}
.btn-blue{background:#1a73e8;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-weight:bold;font-size:13px;}
.btn-green{background:#188038;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-weight:bold;font-size:13px;}
.btn-red{background:#d93025;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-weight:bold;font-size:12px;}
.btn-grey{background:#eee;color:#555;border:none;padding:8px 14px;border-radius:6px;}
.btn-orange{background:#e37400;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-weight:bold;font-size:12px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}

.month-nav{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 14px;}
.pills{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:5px;}
.pill{padding:4px 8px;border-radius:10px;border:1px solid #dadce0;font-size:11px;background:#fff;color:#555;}
.pill.on{background:#1a73e8;color:#fff;font-weight:bold;border-color:#1a73e8;}
.pill.cur{border:2px solid #1a73e8;color:#1a73e8;font-weight:bold;}
.pill.on.cur{background:#1a73e8;color:#fff;}

.summary{display:flex;gap:7px;padding:10px 12px;background:#fff;border-bottom:1px solid #e0e0e0;}
.card{flex:1;border-radius:8px;padding:8px 6px;text-align:center;}
.card .v{font-size:18px;font-weight:bold;}
.card .l{font-size:10px;color:#666;margin-top:1px;}

.mstrip{background:#e8f0fe;padding:4px 14px;display:flex;justify-content:space-between;align-items:center;}
.arrow{background:transparent;border:none;color:#1a73e8;font-size:22px;font-weight:bold;}

.thead{display:grid;grid-template-columns:26px 1fr 90px 30px 26px;background:#f1f3f4;border-bottom:2px solid #dadce0;padding:7px 12px;font-weight:bold;color:#555;font-size:11px;}
.mrow{display:grid;grid-template-columns:26px 1fr 90px 30px 26px;align-items:center;min-height:42px;}
.midx{text-align:center;color:#aaa;font-size:11px;font-weight:bold;}
.minp{border:none;background:transparent;padding:8px 4px;font-size:13px;color:#202124;outline:none;width:100%;}
.mbtn{margin:3px;padding:5px 0;border-radius:5px;border:none;color:#fff;font-weight:bold;font-size:11px;width:calc(100% - 6px);}
.mdel{background:transparent;border:none;color:#ccc;font-size:17px;padding:0;}
.mrec{background:transparent;border:none;font-size:16px;padding:0;opacity:.6;}
.trow{display:grid;grid-template-columns:26px 1fr 90px 30px 26px;background:#e8f0fe;border-top:2px solid #1a73e8;padding:8px 0;font-weight:bold;}
.addbtn{margin-top:10px;width:100%;padding:10px;border-radius:8px;border:2px dashed #1a73e8;background:transparent;color:#1a73e8;font-weight:bold;font-size:13px;}

.unpaid-box{margin:0 12px 12px;background:#fff3f3;border:1px solid #f5c6c2;border-radius:8px;padding:12px;}

.notes-sec{margin:8px 12px 4px;background:#fff;border-radius:10px;padding:14px;border:1px solid #dadce0;}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.mhdr{background:#1a73e8;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.mhdr-title{font-weight:bold;font-size:15px;}
.mclose{background:transparent;border:none;color:#fff;font-size:22px;line-height:1;}
.mbody{padding:20px;}
.mfoot{padding:12px 20px;border-top:1px solid #eee;display:flex;gap:8px;justify-content:flex-end;}

.receipt{font-family:'Courier New',monospace;background:#fffef0;border:2px dashed #ccc;border-radius:8px;padding:20px;margin-bottom:16px;}
.stamp{display:inline-block;border:3px solid #188038;color:#188038;font-weight:bold;padding:4px 12px;border-radius:4px;font-size:14px;transform:rotate(-8deg);letter-spacing:2px;}

.sec{padding:12px;}
.overflow{overflow-x:auto;}
table{border-collapse:collapse;width:100%;}
th{background:#1a73e8;color:#fff;padding:6px 4px;text-align:center;font-size:10px;white-space:nowrap;}
th.nth{text-align:left;padding:8px 10px;min-width:90px;position:sticky;left:0;z-index:5;}
th.tth{background:#0d47a1;}
td{border:1px solid #fff;padding:4px 2px;text-align:center;font-size:13px;}
td.ntd{padding:7px 10px;font-weight:bold;border-right:2px solid #dadce0;font-size:12px;position:sticky;left:0;z-index:3;}
td.ttd{font-weight:bold;padding:7px 5px;}
tr.even td{background:#fff;}tr.even td.ntd{background:#fff;}
tr.odd td{background:#f8f9fa;}tr.odd td.ntd{background:#f8f9fa;}
tfoot td{font-weight:bold;padding:6px 3px;text-align:center;font-size:10px;background:#e8f0fe;}
tfoot td.ntd{padding:8px 10px;color:#1a73e8;position:sticky;left:0;z-index:3;}
.cp{background:#e6f4ea!important;cursor:pointer;}
.cu{background:#fce8e6!important;cursor:pointer;}
.cc{outline:2px inset #1a73e8;}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;border:2px solid #dadce0;background:#fff;color:#555;}
.chip.on{background:#1a73e8;color:#fff;border-color:#1a73e8;font-weight:bold;}
.hint{color:#888;font-size:11px;margin-top:8px;}
.edit-input{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.7);color:#fff;padding:4px 8px;border-radius:6px;font-size:14px;font-weight:bold;outline:none;width:100%;}
.no-sel{color:#888;text-align:center;padding:30px;background:#fff;border-radius:10px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<script>
const MONTHS=["ጥሪ","ለካቲት","መጋቢት","ሚያዝያ","ግንቦት","ሰነ","ሓምለ","ነሓሰ","መስከረም","ጥቅምቲ","ሕዳር","ታህሳስ"];
const YEARS=[2024,2025,2026,2027,2028];
const NOW=new Date();
const CUR=mk(NOW.getFullYear(),NOW.getMonth()+1);
const ADMIN_PW="adiqeyta2024";

function mk(y,m){return y+"-"+String(m).padStart(2,"0");}
function parseMk(k){const[y,m]=k.split("-");return{y:+y,m:+m};}
function lbl(k){const{y,m}=parseMk(k);return MONTHS[m-1]+" "+y;}
function shiftMk(k,n){let{y,m}=parseMk(k);m+=n;while(m>12){m-=12;y++;}while(m<1){m+=12;y--;}return mk(y,m);}
function mOfYear(y){return Array.from({length:12},(_,i)=>mk(y,i+1));}
function pad2(n){return String(n).padStart(2,"0");}
function timeStr(){return pad2(NOW.getHours())+":"+pad2(NOW.getMinutes());}
function dateStr(){return NOW.toLocaleDateString("ti",{year:"numeric",month:"long",day:"numeric"});}

const DEF={churchName:"ማሓበር ዓዲ ቀይታ",amount:50,members:[{id:1,name:""},{id:2,name:""},{id:3,name:""}],payments:{},notes:{},memberNotes:{}};

function load(){try{var r=localStorage.getItem("mahaber_v5");if(r)return JSON.parse(r);}catch(e){}return null;}
function doSave(d){try{localStorage.setItem("mahaber_v5",JSON.stringify(d));return true;}catch(e){return false;}}

var S={
  data:load()||JSON.parse(JSON.stringify(DEF)),
  activeMonth:CUR,
  view:"month",
  selId:null,
  showExport:false,
  showSettings:false,
  adminOk:false,
  editingChurch:false,
  editingAmount:false,
  navYear:NOW.getFullYear(),
  saveStatus:"idle",
  importTxt:"",
  importErr:"",
  modal:null,
  notesSaved:false
};

if(!S.data.notes)S.data.notes={};
if(!S.data.memberNotes)S.data.memberNotes={};

var saveT=null,noteT=null;

function saveData(){
  var ok=doSave(S.data);
  S.saveStatus=ok?"saved":"failed";
  clearTimeout(saveT);
  saveT=setTimeout(function(){S.saveStatus="idle";render();},2000);
}

function isPaid(id,k){return!!S.data.payments[id+"-"+k];}
function togglePay(id,k){S.data.payments[id+"-"+k]=!S.data.payments[id+"-"+k];saveData();render();}
function updateName(id,val){S.data.members=S.data.members.map(function(m){return m.id===id?{id:m.id,name:val}:m;});saveData();}
function addMember(){var id=S.data.members.length?Math.max.apply(null,S.data.members.map(function(m){return m.id;}))+1:1;S.data.members.push({id:id,name:""});saveData();render();}
function delMember(id){S.data.members=S.data.members.filter(function(m){return m.id!==id;});saveData();render();}

function relMonths(){
  var rec={};
  Object.keys(S.data.payments).forEach(function(k){var p=k.split("-");rec[mk(p[0],parseInt(p[1]))]=1;});
  var near=[];for(var i=-3;i<=6;i++)near.push(shiftMk(CUR,i));
  var all=near.concat(Object.keys(rec));
  var u={};all.forEach(function(m){u[m]=1;});
  return Object.keys(u).sort();
}

function exportJSON(){
  var json=JSON.stringify(S.data,null,2);
  var blob=new Blob([json],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="mahaber_"+new Date().toISOString().slice(0,10)+".json";
  a.click();URL.revokeObjectURL(url);
}

function doImport(){
  try{
    var p=JSON.parse(S.importTxt);
    if(!p.members||!p.payments)throw new Error("bad");
    S.data=Object.assign({},JSON.parse(JSON.stringify(DEF)),p);
    if(!S.data.notes)S.data.notes={};
    if(!S.data.memberNotes)S.data.memberNotes={};
    S.importTxt="";S.importErr="";S.showExport=false;
    saveData();render();
  }catch(e){S.importErr="❌ ዘይቅቡል ፋይል";render();}
}

function checkAdmin(){
  var inp=document.getElementById("admin-pw-input");
  if(!inp)return;
  if(inp.value===ADMIN_PW){S.adminOk=true;render();}
  else{
    var err=document.getElementById("admin-err");
    if(err){err.style.display="block";}
  }
}

function openReceipt(id,mk2){
  var mem=S.data.members.filter(function(m){return m.id===id;})[0];
  S.modal={type:"receipt",mem:mem,mk:mk2,paid:isPaid(id,mk2),rno:"RCP-"+Date.now().toString().slice(-6)};
  render();
}

function printReceipt(){
  var el=document.getElementById("rcpt-inner");
  if(!el)return;
  var w=window.open("","_blank","width=420,height=600");
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>ቅብሊት</title><style>body{font-family:"Courier New",monospace;padding:20px;background:#fffef0;}.r{border:2px dashed #ccc;padding:20px;max-width:340px;margin:0 auto;}.c{text-align:center;}.b{font-weight:bold;}.row{display:flex;justify-content:space-between;margin:5px 0;font-size:13px;}hr{border:none;border-top:1px dashed #ccc;margin:10px 0;}.stamp{display:inline-block;border:3px solid #188038;color:#188038;font-weight:bold;padding:4px 12px;border-radius:4px;transform:rotate(-8deg);letter-spacing:2px;font-size:14px;}</style></head><body><div class="r">'+el.innerHTML+'</div></body></html>');
  w.document.close();
  setTimeout(function(){w.print();},400);
}

function shareReceipt(){
  var m=S.modal;if(!m)return;
  var txt="🧾 ቅብሊት — "+S.data.churchName+"\n──────────────\nስም: "+m.mem.name+"\nወርሒ: "+lbl(m.mk)+"\nዝኸፈሎ: $"+S.data.amount+"\nኩነታት: ✅ ተከፊሉ\nዕለት: "+dateStr()+"\nNo: "+m.rno+"\n──────────────\nኣምላኽ ይሃብካ! 🙏";
  if(navigator.share){navigator.share({title:"ቅብሊት",text:txt});}
  else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){alert("ቅብሊት ተቐዲሑ ✓");});}
}

function closeModal(){S.modal=null;render();}

function openNotes(type,key,title){
  var val=(type==="month"?S.data.notes:S.data.memberNotes)[key]||"";
  S.modal={type:"notes",ntype:type,key:key,title:title,val:val};
  render();
}

function saveNote(){
  var ta=document.getElementById("notes-ta");
  if(!ta)return;
  var val=ta.value;
  if(S.modal.ntype==="month")S.data.notes[S.modal.key]=val;
  else S.data.memberNotes[S.modal.key]=val;
  saveData();
  var st=document.getElementById("notes-st");
  if(st){st.textContent="✓ ተሓዚሉ";setTimeout(function(){if(st)st.textContent="";},1500);}
}

function card(l,v,col,bg){
  return'<div class="card" style="background:'+bg+';border:1px solid '+col+'33"><div class="v" style="color:'+col+'">'+v+'</div><div class="l">'+l+'</div></div>';
}

function noteDot(key,isMonth){
  var n=(isMonth?S.data.notes:S.data.memberNotes)[key];
  return n&&n.trim()?'<span style="display:inline-block;width:8px;height:8px;background:#e37400;border-radius:50%;margin-left:4px;vertical-align:middle"></span>':"";
}

function renderModal(){
  var m=S.modal;
  if(!m)return"";

  if(m.type==="receipt"){
    var paid=m.paid;
    var rcpt='<div class="c" style="margin-bottom:12px"><div style="font-size:17px;font-weight:bold;color:#1a73e8">⛪ '+S.data.churchName+'</div><div style="font-size:11px;color:#888;margin-top:3px">ወርሓዊ ክፍሊት ቅብሊት</div></div><hr/><div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span>ቅብሊት No:</span><span style="color:#aaa">'+m.rno+'</span></div><div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span>ዕለት:</span><span>'+dateStr()+'</span></div><div style="display:flex;justify-content:space-between;font-size:12px;margin:4px 0"><span>ሰዓት:</span><span>'+timeStr()+'</span></div><hr/><div style="display:flex;justify-content:space-between;font-size:14px;font-weight:bold;margin:6px 0"><span>ስም ኣባል:</span><span>'+(m.mem.name||"—")+'</span></div><div style="display:flex;justify-content:space-between;font-size:14px;margin:6px 0"><span>ወርሒ:</span><span>'+lbl(m.mk)+'</span></div><div style="display:flex;justify-content:space-between;font-size:16px;font-weight:bold;margin:6px 0"><span>ዝኸፈሎ:</span><span style="color:#188038">$'+S.data.amount+'</span></div><hr/><div style="text-align:center;margin-top:10px"><span class="stamp">'+(paid?"✅ ተከፊሉ":"❌ ኣይከፈለን")+'</span></div><div style="text-align:center;margin-top:14px;font-size:11px;color:#888">ኣምላኽ ይሃብካ 🙏</div>';
    return'<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="mhdr"><span class="mhdr-title">🧾 ቅብሊት</span><button class="mclose" onclick="closeModal()">×</button></div><div class="mbody"><div class="receipt" id="rcpt-inner">'+rcpt+'</div><div class="btn-row"><button class="btn-blue" onclick="printReceipt()">🖨️ Print</button><button class="btn-green" onclick="shareReceipt()">📤 Share</button>'+((!paid)?'<button class="btn-orange" onclick="togglePay('+m.mem.id+',\''+m.mk+'\');S.modal.paid=true;render()">✓ ከፊሉ</button>':"")+'</div></div></div></div>';
  }

  if(m.type==="notes"){
    return'<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="mhdr"><span class="mhdr-title">📝 '+m.title+'</span><button class="mclose" onclick="closeModal()">×</button></div><div class="mbody"><textarea id="notes-ta" style="width:100%;min-height:130px;border:1px solid #dadce0;border-radius:8px;padding:10px;font-size:13px;resize:vertical;outline:none;" placeholder="ሕጊ፣ ዝተሰማምዐሉ ነገር ወይ ሓሳብ ጸሓፍ...">'+m.val+'</textarea><div id="notes-st" style="font-size:11px;color:#188038;height:16px;margin-top:4px"></div></div><div class="mfoot"><button class="btn-grey" onclick="closeModal()">ዕጸው</button><button class="btn-green" onclick="saveNote()">💾 ሓዝ</button></div></div></div>';
  }
  return"";
}

function render(){
  var d=S.data,am=S.activeMonth,v=S.view,ny=S.navYear;
  var members=d.members,amount=d.amount,churchName=d.churchName;
  var dm=relMonths();
  var pc=members.filter(function(m){return isPaid(m.id,am);}).length;
  var uc=members.length-pc;
  var tc=pc*amount;
  var unp=members.filter(function(m){return !isPaid(m.id,am)&&m.name.trim();});
  var selMem=members.filter(function(m){return m.id===S.selId;})[0]||null;
  var ap=parseMk(am);

  var html='<div class="topbar"><div class="topbar-row"><div style="flex:1;margin-right:8px">';
  if(S.editingChurch){
    html+='<input class="edit-input" id="church-inp" value="'+churchName.replace(/"/g,"&quot;")+'">';
  } else {
    html+='<div style="font-weight:bold;font-size:15px;cursor:pointer" onclick="S.editingChurch=true;render()">⛪ '+churchName+' <span style="font-size:11px;opacity:.7">✏️</span></div>';
  }
  html+='<div class="sub-info">ወርሓዊ $'+amount;
  if(S.saveStatus==="saved")html+='<span class="badge">✓ ተሓዚሉ</span>';
  if(S.saveStatus==="failed")html+='<span class="badge" style="background:rgba(255,0,0,.3)">⚠️ export ግበር</span>';
  html+='</div></div><div style="display:flex;gap:5px">';
  html+='<button class="tbtn" onclick="S.showExport=!S.showExport;render()">💾</button>';
  html+='<button class="tbtn" onclick="S.showSettings=!S.showSettings;render()">⚙️</button>';
  html+='</div></div>';
  html+='<div class="tabs">';
  [["month","📋 ወርሒ"],["year","📆 ዓመት"],["overview","🗓 ሓፈሻ"],["member","👤 ኣባል"]].forEach(function(t){
    html+='<button class="tab '+(v===t[0]?"active":"inactive")+'" onclick="S.view=\''+t[0]+'\';render()">'+t[1]+'</button>';
  });
  html+='</div></div>';

  // EXPORT
  if(S.showExport){
    html+='<div class="panel"><div class="panel-title">💾 ዳታ ምዕቃብን ምምላስን</div>';
    html+='<div class="warn-box">⚠️ ወርሓዊ export ምግባር ይምከር!</div>';
    html+='<div class="btn-row"><button class="btn-blue" onclick="exportJSON()">⬇️ Export JSON</button>';
    html+='<button class="btn-green" onclick="document.getElementById(\'file-imp\').click()">⬆️ Import</button>';
    html+='<input id="file-imp" type="file" accept=".json" style="display:none" onchange="var r=new FileReader();r.onload=function(e){S.importTxt=e.target.result;render();};r.readAsText(this.files[0]);"/></div>';
    if(S.importTxt){
      html+='<div style="margin-top:10px"><div style="font-size:12px;color:#555;margin-bottom:6px">Import ክትቅጽል ዶ?</div>';
      if(S.importErr)html+='<div style="color:#d93025;font-size:12px;margin-bottom:6px">'+S.importErr+'</div>';
      html+='<div class="btn-row"><button class="btn-green" onclick="doImport()">✓ እወ</button><button class="btn-grey" onclick="S.importTxt=\'\';S.importErr=\'\';render()">ሰርዝ</button></div></div>';
    }
    html+='</div>';
  }

  // SETTINGS
  if(S.showSettings){
    if(!S.adminOk){
      html+='<div class="panel"><div class="panel-title">⚙️ Admin ምቕያር</div>';
      html+='<div style="font-size:12px;color:#555;margin-bottom:8px">Password ጸሓፍ:</div>';
      html+='<div style="display:flex;gap:8px"><input id="admin-pw-input" type="password" placeholder="password..." style="flex:1;padding:8px;border:1px solid #dadce0;border-radius:6px;font-size:13px;outline:none"/>';
      html+='<button class="btn-blue" style="padding:8px 14px" onclick="checkAdmin()">እቶ</button></div>';
      html+='<div id="admin-err" style="color:#d93025;font-size:12px;margin-top:6px;display:none">❌ ዘይቅቡል password</div>';
      html+='</div>';
    } else {
      html+='<div class="panel"><div class="panel-title">⚙️ ምቕያር</div>';
      html+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="color:#555">ወርሓዊ ክፍሊት:</span>';
      if(S.editingAmount){
        html+='<input id="amt-inp" type="number" min="1" value="'+amount+'" style="width:70px;padding:5px 8px;border:2px solid #1a73e8;border-radius:6px;font-size:14px;font-weight:bold;outline:none;color:#1a73e8;"/>';
        html+='<button class="btn-green" style="padding:6px 14px;border-radius:6px" onclick="var v=parseFloat(document.getElementById(\'amt-inp\').value);if(!isNaN(v)&&v>0)S.data.amount=v;S.editingAmount=false;saveData();render();">✓ ሓዝ</button>';
        html+='<button class="btn-grey" onclick="S.editingAmount=false;render()">ሰርዝ</button>';
      } else {
        html+='<span style="font-weight:bold;font-size:18px;color:#1a73e8">$'+amount+'</span>';
        html+='<button style="background:#e8f0fe;color:#1a73e8;border:1px solid #c5d8f7;padding:5px 12px;border-radius:6px;font-weight:bold;font-size:12px;" onclick="S.editingAmount=true;render()">✏️ ቀይር</button>';
      }
      html+='</div><div style="margin-top:10px"><button class="btn-grey" style="font-size:11px" onclick="S.adminOk=false;S.showSettings=false;render()">🔒 ዕጸው</button></div>';
      html+='</div>';
    }
  }

  // MONTH VIEW
  if(v==="month"){
    html+='<div class="month-nav"><div class="pills">';
    YEARS.forEach(function(y){html+='<button class="pill '+(ap.y===y?"on":"")+'" onclick="S.activeMonth=\''+mk(y,ap.m)+'\';render()">'+y+'</button>';});
    html+='</div><div class="pills">';
    MONTHS.forEach(function(mn,i){
      var tmk=mk(ap.y,i+1);
      html+='<button class="pill '+(tmk===am?"on":"")+" "+(tmk===CUR?"cur":"")+'" onclick="S.activeMonth=\''+tmk+'\';render()">'+mn+'</button>';
    });
    html+='</div></div>';

    html+='<div class="summary">'+card("ኣባላት",members.length,"#1a73e8","#e8f0fe")+card("ከፊሎም ✓",pc,"#188038","#e6f4ea")+card("ዘይከፈሉ",uc,"#d93025","#fce8e6")+card("ዝተኣከበ","$"+tc,"#e37400","#fef3e2")+'</div>';

    html+='<div class="mstrip"><button class="arrow" onclick="S.activeMonth=shiftMk(S.activeMonth,-1);render()">‹</button><div style="text-align:center"><span style="font-weight:bold;font-size:15px;color:#1a73e8">'+lbl(am)+'</span>'+(am===CUR?'<span style="margin-left:6px;font-size:11px;color:#1a73e8">● ሕጂ</span>':"")+'</div><button class="arrow" onclick="S.activeMonth=shiftMk(S.activeMonth,+1);render()">›</button></div>';

    html+='<div class="thead"><div>#</div><div>ሽም ኣባል</div><div style="text-align:center">ኩነታት</div><div style="text-align:center">🧾</div><div></div></div>';
    html+='<div style="padding:0 12px 8px">';
    members.forEach(function(m,i){
      var paid=isPaid(m.id,am);
      html+='<div class="mrow" style="background:'+(paid?"#e6f4ea":"#fce8e6")+';border-bottom:1px solid '+(paid?"#ceead6":"#f5c6c2")+'"><div class="midx">'+(i+1)+'</div>';
      html+='<input class="minp" value="'+m.name.replace(/"/g,"&quot;")+'" placeholder="ኣባል '+(i+1)+'..." oninput="updateName('+m.id+',this.value)"/>';
      html+='<button class="mbtn" style="background:'+(paid?"#188038":"#d93025")+'" onclick="togglePay('+m.id+',\''+am+'\')">'+(paid?"✓ ከፊሉ":"✗ ኣይከፈለን")+'</button>';
      html+='<button class="mrec" onclick="openReceipt('+m.id+',\''+am+'\')">🧾</button>';
      html+='<button class="mdel" onclick="delMember('+m.id+')">×</button></div>';
    });
    html+='<div class="trow"><div></div><div style="padding-left:4px;color:#1a73e8;font-size:12px">ድምር: '+members.length+' ኣባላት</div><div style="text-align:center;color:#188038;font-size:13px">$'+tc+'</div><div></div><div></div></div>';
    html+='<button class="addbtn" onclick="addMember()">+ ሓድሽ ኣባል ወስኽ</button></div>';

    if(unp.length>0){
      html+='<div class="unpaid-box"><div style="font-weight:bold;color:#d93025;margin-bottom:6px">⚠️ ዘይከፈሉ ('+unp.length+') — $'+(unp.length*amount)+' ይጎድል</div>';
      unp.forEach(function(m,i){html+='<div style="color:#c62828;font-size:12px;padding:2px 0">'+(i+1)+'. '+m.name+'</div>';});
      html+='</div>';
    }

    var mNote=d.notes[am]||"";
    html+='<div class="notes-sec"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-weight:bold;color:#555;font-size:12px">📝 ሕጊ / ሓሳብ — '+lbl(am)+noteDot(am,true)+'</div><button class="btn-orange" style="padding:4px 10px;font-size:11px" onclick="openNotes(\'month\',\''+am+'\',\''+lbl(am)+'\')">✏️ ጸሓፍ</button></div>';
    html+=mNote?'<div style="background:#fef9e7;border:1px solid #f5d56a;border-radius:8px;padding:10px;font-size:13px;color:#555;white-space:pre-wrap">'+mNote+'</div>':'<div style="color:#bbb;font-size:12px;font-style:italic">ሕጊ ወይ ሓሳብ ኣይተጸሓፈን</div>';
    html+='</div>';
  }

  // YEAR VIEW
  if(v==="year"){
    var ymks=mOfYear(ny);
    var yt=ymks.reduce(function(s,k){return s+members.filter(function(m){return isPaid(m.id,k);}).length*amount;},0);
    var yp=members.length*12*amount;
    html+='<div class="sec"><div style="display:flex;gap:4px;justify-content:center;margin-bottom:12px;flex-wrap:wrap">';
    YEARS.forEach(function(y){html+='<button class="pill '+(ny===y?"on":"")+'" onclick="S.navYear='+y+';render()">'+y+'</button>';});
    html+='</div><div style="display:flex;gap:7px;margin-bottom:12px">'+card(ny+" ዝተኣከበ","$"+yt,"#188038","#e6f4ea")+card("ዝተጸበ","$"+yp,"#1a73e8","#e8f0fe")+card("ዘይተሰብሰበ","$"+(yp-yt),"#d93025","#fce8e6")+'</div>';
    html+='<div class="overflow"><table><thead><tr><th class="nth">ሽም ኣባል</th>';
    MONTHS.forEach(function(mn,i){var tmk=mk(ny,i+1);html+='<th onclick="S.activeMonth=\''+tmk+'\';S.view=\'month\';render()" style="min-width:34px;'+(tmk===CUR?"border-bottom:3px solid #ffd700":"")+'">'+mn.slice(0,3)+noteDot(tmk,true)+'</th>';});
    html+='<th class="tth">ድምር</th></tr></thead><tbody>';
    members.forEach(function(m,idx){
      var pm=ymks.filter(function(k){return isPaid(m.id,k);});
      html+='<tr class="'+(idx%2===0?"even":"odd")+'"><td class="ntd">'+(m.name||"ኣባል "+(idx+1))+'</td>';
      ymks.forEach(function(k){var p=isPaid(m.id,k);html+='<td class="'+(p?"cp":"cu")+(k===CUR?" cc":"")+'" onclick="togglePay('+m.id+',\''+k+'\')">'+(p?"✓":"·")+'</td>';});
      html+='<td class="ttd" style="color:'+(pm.length===12?"#188038":pm.length>0?"#e37400":"#d93025")+'">$'+(pm.length*amount)+'</td></tr>';
    });
    html+='</tbody><tfoot><tr><td class="ntd">ድምር</td>';
    ymks.forEach(function(k){var c=members.filter(function(m){return isPaid(m.id,k);}).length;html+='<td style="color:'+(c===members.length?"#188038":"#d93025")+'">'+c+'/'+members.length+'</td>';});
    html+='<td style="color:#1a73e8;font-weight:bold;padding:7px 5px">$'+yt+'</td></tr></tfoot></table></div>';
    html+='<div class="hint">💡 ሓደ ክፍሊ ጠውቕ ፡ ኩነታቱ ይቕየር</div></div>';
  }

  // OVERVIEW
  if(v==="overview"){
    html+='<div class="sec"><div style="font-weight:bold;color:#1a73e8;margin-bottom:8px">🗓 ሓፈሻዊ ሪፖርት</div><div class="overflow"><table><thead><tr><th class="nth" style="position:sticky;left:0;z-index:6">ሽም ኣባል</th>';
    dm.forEach(function(k){var p2=parseMk(k);html+='<th onclick="S.activeMonth=\''+k+'\';S.view=\'month\';render()" style="min-width:40px;font-size:9px;'+(k===CUR?"border-bottom:3px solid #ffd700":"")+(k===am?"background:#155db2":"")+'">'+MONTHS[p2.m-1].slice(0,3)+'<br/><span style="opacity:.7">'+p2.y+'</span>'+noteDot(k,true)+'</th>';});
    html+='<th class="tth">ጠቕላላ</th></tr></thead><tbody>';
    members.forEach(function(m,idx){
      var tot=dm.filter(function(k){return isPaid(m.id,k);}).length*amount;
      html+='<tr class="'+(idx%2===0?"even":"odd")+'" style="cursor:pointer" onclick="S.selId='+m.id+';S.view=\'member\';render()"><td class="ntd" style="color:#1a73e8">'+(m.name||"ኣባል "+(idx+1))+'</td>';
      dm.forEach(function(k){var p=isPaid(m.id,k);html+='<td class="'+(p?"cp":"cu")+(k===CUR?" cc":"")+'" onclick="event.stopPropagation();togglePay('+m.id+',\''+k+'\')">'+(p?"✓":"·")+'</td>';});
      html+='<td class="ttd" style="color:#1a73e8">$'+tot+'</td></tr>';
    });
    html+='</tbody><tfoot><tr><td class="ntd">ድምር</td>';
    dm.forEach(function(k){var c=members.filter(function(m){return isPaid(m.id,k);}).length;html+='<td style="color:'+(c===members.length?"#188038":"#d93025")+'">'+c+'/'+members.length+'</td>';});
    html+='<td style="color:#1a73e8;font-weight:bold">$'+dm.reduce(function(s,k){return s+members.filter(function(m){return isPaid(m.id,k);}).length*amount;},0)+'</td></tr></tfoot></table></div>';
    html+='<div class="hint">💡 ስም ጠውቕ ↗ ናይ ኣባል ዝርዝር ርኣ</div></div>';
  }

  // MEMBER VIEW
  if(v==="member"){
    html+='<div class="sec"><div style="font-weight:bold;color:#1a73e8;margin-bottom:10px">👤 ናይ ኣባል ሪፖርት</div><div class="chips">';
    members.forEach(function(m){html+='<button class="chip '+(S.selId===m.id?"on":"")+'" onclick="S.selId='+m.id+';render()">'+(m.name||"ኣባል "+m.id)+noteDot("m"+m.id,false)+'</button>';});
    html+='</div>';

    if(selMem){
      var allMks=YEARS.reduce(function(a,y){return a.concat(mOfYear(y));},[]);
      var pmks=allMks.filter(function(k){return isPaid(selMem.id,k);});
      var nuMks=dm.filter(function(k){return !isPaid(selMem.id,k);});
      var ymks2=mOfYear(ny);
      var memNote=d.memberNotes["m"+selMem.id]||"";

      html+='<div style="display:flex;gap:7px;margin-bottom:12px">'+card("ዝኸፈሎ ወርሓት",pmks.length,"#188038","#e6f4ea")+card("ዘይከፈሎ",nuMks.length,"#d93025","#fce8e6")+card("ጠቕላላ","$"+(pmks.length*amount),"#e37400","#fef3e2")+'</div>';

      html+='<div class="notes-sec" style="margin:0 0 10px 0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-weight:bold;color:#555;font-size:12px">📝 ብዛዕባ '+(selMem.name||"ኣባል")+noteDot("m"+selMem.id,false)+'</div><button class="btn-orange" style="padding:4px 10px;font-size:11px" onclick="openNotes(\'member\',\'m'+selMem.id+'\',\''+((selMem.name||"ኣባል").replace(/'/g,"\\'"))+'\')">✏️ ጸሓፍ</button></div>';
      html+=memNote?'<div style="background:#fef9e7;border:1px solid #f5d56a;border-radius:8px;padding:10px;font-size:13px;color:#555;white-space:pre-wrap">'+memNote+'</div>':'<div style="color:#bbb;font-size:12px;font-style:italic">ሕጊ ወይ ሓሳብ ኣይተጸሓፈን</div>';
      html+='</div>';

      html+='<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">';
      YEARS.forEach(function(y){html+='<button class="pill '+(ny===y?"on":"")+'" onclick="S.navYear='+y+';render()">'+y+'</button>';});
      html+='</div>';

      ymks2.forEach(function(k){
        var paid=isPaid(selMem.id,k);
        var isc=k===CUR;
        html+='<div style="display:flex;align-items:center;justify-content:space-between;background:'+(paid?"#e6f4ea":"#fce8e6")+';border-radius:8px;padding:10px 12px;margin-bottom:5px;border:'+(isc?"2":"1")+'px solid '+(paid?"#ceead6":"#f5c6c2")+';'+(isc?"box-shadow:0 0 0 2px #1a73e833":"")+'"><div><div style="font-weight:bold;color:#333">'+lbl(k)+'</div>'+(isc?'<div style="font-size:10px;color:#1a73e8">● ሕጂ</div>':"")+'</div><div style="display:flex;align-items:center;gap:6px">'+(paid?'<span style="color:#188038;font-size:12px;font-weight:bold">$'+amount+'</span>':"")+'<button class="'+(paid?"btn-green":"btn-red")+'" style="padding:5px 10px" onclick="togglePay('+selMem.id+',\''+k+'\')">'+(paid?"✓ ከፊሉ":"✗ ኣይከፈለን")+'</button><button style="background:#fff8e1;border:1px solid #f5d56a;color:#e37400;padding:5px 8px;border-radius:6px;font-size:13px;" onclick="openReceipt('+selMem.id+',\''+k+'\')">🧾</button></div></div>';
      });
    } else {
      html+='<div class="no-sel">☝️ ናይ ኣባል ስም ምረጽ</div>';
    }
    html+='</div>';
  }

  document.getElementById("app").innerHTML=html;
  document.getElementById("modal-root").innerHTML=renderModal();

  if(S.editingChurch){
    var ci=document.getElementById("church-inp");
    if(ci){
      ci.focus();
      ci.onblur=function(){S.data.churchName=ci.value;S.editingChurch=false;saveData();render();};
      ci.onkeydown=function(e){if(e.key==="Enter"){S.data.churchName=ci.value;S.editingChurch=false;saveData();render();}};
    }
  }
}

render();
</script>
</body>
</html>
